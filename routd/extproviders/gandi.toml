[[ext]]
name = "gandi"
base = "https://api.gandi.net/v5"

  [ext.auth]
  method = "bearer"
  secret = "GANDI_PAT"

  [[ext.tool]]
  name        = "dns_list"
  description = "List DNS records for a Gandi domain."
  scope       = "ext:gandi:dns:read"
  method      = "GET"
  path        = "/livedns/domains/{domain}/records"

  [[ext.tool]]
  name        = "dns_set"
  description = "Create or replace a DNS record for a Gandi domain. {rrset_name} is the record name, {rrset_type} is the record type."
  scope       = "ext:gandi:dns:write"
  method      = "PUT"
  path        = "/livedns/domains/{domain}/records/{rrset_name}/{rrset_type}"
