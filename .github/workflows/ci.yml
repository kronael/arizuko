name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: bun install

      - name: Install pre-commit
        run: pip install pre-commit

      - name: pre-commit
        run: pre-commit run --all-files

      - name: Lint
        run: make lint

      - name: Test
        run: make test

  # E2E tests run only on release-tag pushes (vX.Y.Z). Drives a real round
  # through the slink HTTP/MCP surface; slow + currently in-process. Heavier
  # shapes may need Docker — when added, gate on docker availability.
  e2e:
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    needs: ci
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: E2E
        run: make test-e2e
