image = "arizuko-whatsapp:latest"
entrypoint = ["node", "dist/main.js"]
volumes = ["${DATA_DIR}/store/whatsapp-auth:/srv/data/store/whatsapp-auth"]

[environment]
ROUTER_URL = "http://routd:8080"
ASSISTANT_NAME = "${ASSISTANT_NAME}"
LISTEN_ADDR = ":8080"
LISTEN_URL = "http://whapd:8080"
WHATSAPP_AUTH_DIR = "/srv/data/store/whatsapp-auth"
