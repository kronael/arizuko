repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
        exclude: ^\.refs/
      - id: end-of-file-fixer
        exclude: ^\.refs/
      - id: check-yaml
        exclude: ^(\.refs/|deploy/helm/.*/templates/)
      - id: check-json
        exclude: ^\.refs/
      - id: check-merge-conflict
      - id: detect-private-key

  - repo: https://github.com/pre-commit/mirrors-prettier
    rev: v4.0.0-alpha.8
    hooks:
      - id: prettier
        files: \.(ts|js|json|yaml|yml|md)$
        exclude: ^(\.refs/|package-lock\.json|ant/|\.claude/|\.diary/|BUGS\.md$|deploy/helm/.*/templates/)

  - repo: local
    hooks:
      - id: typecheck
        name: typecheck
        entry: bunx tsc --noEmit
        language: system
        pass_filenames: false
        files: \.ts$
        exclude: ^(\.refs/|container/|ant/|whapd/|twitd/|tests/dashd-playwright/)
      - id: typecheck-agent
        name: typecheck-agent
        entry: bash -c 'cd ant && npm install --silent && bunx tsc --noEmit'
        language: system
        pass_filenames: false
        files: ^ant/src/.*\.ts$
      - id: stamp-docs
        name: stamp-docs
        entry: python3 stamp-docs.py
        language: system
        files: ^template/web/pub/.*\.html$
