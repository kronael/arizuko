{{- if .Values.timed.enabled }}
{{/*
timed — scheduled-message daemon. Writes to the shared DB; no HTTP ingress
beyond /health. Co-schedules with gated on the data PVC.
*/}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "arizuko.fullname" . }}-timed
  labels:
    {{- include "arizuko.labels" . | nindent 4 }}
    app.kubernetes.io/component: timed
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      {{- include "arizuko.selectorLabels" (dict "ctx" . "daemon" "timed") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "arizuko.selectorLabels" (dict "ctx" . "daemon" "timed") | nindent 8 }}
    spec:
      serviceAccountName: {{ include "arizuko.serviceAccountName" . }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- if .Values.nodeName }}
      nodeName: {{ .Values.nodeName }}
      {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      containers:
        - name: timed
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ["timed"]
          ports:
            - name: http
              containerPort: 8080
          envFrom:
            - configMapRef:
                name: {{ include "arizuko.configMapName" . }}
            - secretRef:
                name: {{ include "arizuko.secretName" . }}
          env:
            # timed reads TIMEZONE; the rest of the platform uses TZ.
            - name: TIMEZONE
              value: {{ .Values.config.tz | quote }}
          volumeMounts:
            - name: data
              mountPath: /srv/app/home
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 30
          {{- with .Values.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: {{ include "arizuko.pvcName" . }}
{{- end }}
