{{- if not .Values.secrets.existingSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "arizuko.secretName" . }}
  labels:
    {{- include "arizuko.labels" . | nindent 4 }}
type: Opaque
stringData:
  # Only non-empty values are emitted; the env-var keys match compose.go /
  # template/services/*.toml exactly. Map secret-value -> env-var name here.
  {{- $pairs := dict
    "CHANNEL_SECRET"          .Values.secrets.channelSecret
    "AUTH_SECRET"             .Values.secrets.authSecret
    "PROXYD_HMAC_SECRET"      .Values.secrets.proxydHmacSecret
    "CLAUDE_CODE_OAUTH_TOKEN" .Values.secrets.claudeCodeOauthToken
    "ANTHROPIC_API_KEY"       .Values.secrets.anthropicApiKey
    "TELEGRAM_BOT_TOKEN"      .Values.secrets.telegramBotToken
    "DISCORD_BOT_TOKEN"       .Values.secrets.discordBotToken
    "SLACK_BOT_TOKEN"         .Values.secrets.slackBotToken
    "SLACK_SIGNING_SECRET"    .Values.secrets.slackSigningSecret
    "MASTODON_ACCESS_TOKEN"   .Values.secrets.mastodonAccessToken
    "MASTODON_INSTANCE_URL"   .Values.secrets.mastodonInstanceUrl
    "BLUESKY_IDENTIFIER"      .Values.secrets.blueskyIdentifier
    "BLUESKY_PASSWORD"        .Values.secrets.blueskyPassword
    "REDDIT_CLIENT_ID"        .Values.secrets.redditClientId
    "REDDIT_CLIENT_SECRET"    .Values.secrets.redditClientSecret
    "REDDIT_USERNAME"         .Values.secrets.redditUsername
    "REDDIT_PASSWORD"         .Values.secrets.redditPassword
    "EMAIL_IMAP_HOST"         .Values.secrets.emailImapHost
    "EMAIL_SMTP_HOST"         .Values.secrets.emailSmtpHost
    "EMAIL_ACCOUNT"           .Values.secrets.emailAccount
    "EMAIL_PASSWORD"          .Values.secrets.emailPassword
    "LINKEDIN_CLIENT_ID"      .Values.secrets.linkedinClientId
    "LINKEDIN_CLIENT_SECRET"  .Values.secrets.linkedinClientSecret
    "LINKEDIN_ACCESS_TOKEN"   .Values.secrets.linkedinAccessToken
    "LINKEDIN_REFRESH_TOKEN"  .Values.secrets.linkedinRefreshToken
  -}}
  {{- range $k, $v := $pairs }}
  {{- if $v }}
  {{ $k }}: {{ $v | quote }}
  {{- end }}
  {{- end }}
{{- end }}
