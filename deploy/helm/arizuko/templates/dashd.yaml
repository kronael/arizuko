{{- if .Values.dashd.enabled }}
{{/*
dashd — operator dashboard (HTMX) served behind proxyd at /dash/. Reads the
shared DB. DB_PATH + DASH_PORT are pinned to the container-internal values.
*/}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "arizuko.fullname" . }}-dashd
  labels:
    {{- include "arizuko.labels" . | nindent 4 }}
    app.kubernetes.io/component: dashd
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      {{- include "arizuko.selectorLabels" (dict "ctx" . "daemon" "dashd") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "arizuko.selectorLabels" (dict "ctx" . "daemon" "dashd") | nindent 8 }}
    spec:
      serviceAccountName: {{ include "arizuko.serviceAccountName" . }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- if .Values.nodeName }}
      nodeName: {{ .Values.nodeName }}
      {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      containers:
        - name: dashd
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ["dashd"]
          ports:
            - name: http
              containerPort: 8080
          envFrom:
            - configMapRef:
                name: {{ include "arizuko.configMapName" . }}
            - secretRef:
                name: {{ include "arizuko.secretName" . }}
          env:
            - name: DB_PATH
              value: /srv/app/home/store/messages.db
            - name: DASH_PORT
              value: "8080"
          volumeMounts:
            - name: data
              mountPath: /srv/app/home
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 30
          {{- with .Values.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: {{ include "arizuko.pvcName" . }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "arizuko.fullname" . }}-dashd
  labels:
    {{- include "arizuko.labels" . | nindent 4 }}
    app.kubernetes.io/component: dashd
spec:
  selector:
    {{- include "arizuko.selectorLabels" (dict "ctx" . "daemon" "dashd") | nindent 4 }}
  ports:
    - name: http
      port: 8080
      targetPort: http
{{- end }}
